<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>VirtualDeck — Brand Icon Pack (Dot Matrix)</title>
<style>
  :root{
    --bg:#070708;
    --panel:#0d0d0f;
    --panel-2:#101013;
    --line:#1a1a1d;
    --text:#e8e8ea;
    --muted:#5c5c63;
    --mono: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);margin:0;font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding:48px 56px 120px}

  header{max-width:1320px;margin:0 auto 36px}
  h1{font-size:24px;font-weight:600;letter-spacing:-0.01em;margin:0 0 6px}
  header p{margin:0;color:var(--muted);font-family:var(--mono);font-size:12px}
  header .meta{margin-top:16px;display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--muted)}
  header .meta b{color:var(--text);font-weight:500}

  .wrap{max-width:1320px;margin:0 auto}
  section{margin:42px 0 0}
  section h2{
    font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.14em;
    text-transform:uppercase;color:var(--muted);margin:0 0 18px;
    padding-bottom:10px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:14px;
  }
  section h2 .num{color:#2c2c30}
  section h2 .count{margin-left:auto;color:#2c2c30}
  section h2 .emoji{filter:grayscale(0.4);opacity:.85}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:16px;
  }
  .tile{
    background:#000;
    border-radius:10px;
    padding:16px 14px 14px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    position:relative;
    overflow:hidden;
    border:1px solid #0e0e10;
    box-shadow:inset 0 0 60px rgba(255,255,255,0.015), 0 1px 0 rgba(255,255,255,0.02);
  }
  .tile::before{
    /* very subtle blue glow corner like reference */
    content:"";position:absolute;inset:-30% -30% auto auto;width:60%;height:60%;
    background:radial-gradient(circle at 30% 30%, rgba(60,90,160,.18), transparent 60%);
    pointer-events:none;
  }
  .tile .panel{
    position:relative;
    width:140px;height:140px;
    border-radius:6px;
    background:#000;
    display:grid;
    place-items:center;
    overflow:hidden;
  }
  .tile .panel::after{
    content:"";position:absolute;inset:0;border-radius:inherit;
    background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.45) 100%);
    pointer-events:none;
  }
  .tile svg{width:140px;height:140px;display:block}
  .tile .lbl{
    font-family:var(--mono);font-size:10.5px;color:#9b9ba1;
    letter-spacing:0.04em;text-align:center;line-height:1.35;
    text-transform:lowercase;
  }
  .tile .idx{
    position:absolute;top:8px;left:10px;
    font-family:var(--mono);font-size:9px;color:#2a2a2e;letter-spacing:0.06em;
  }

  /* dot grid background — off dots */
  .off{ fill:#15151a }
  .off-r{ fill:#1a1a20 }
  /* glow halo behind on-dots */
  .halo{ filter: blur(2.5px); opacity:.55 }

  /* Subtle scanline texture */
  .tile .panel::before{
    content:"";position:absolute;inset:0;border-radius:inherit;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    pointer-events:none;mix-blend-mode:screen;
  }

  /* ============================================
     PER-ICON IDLE ANIMATIONS
     Subtle, looping, mostly affecting the .on layer or whole svg.
     ============================================ */

  /* default: gentle breathing on every tile */
  .tile svg .on{ transform-origin:center; transform-box:fill-box; }
  .tile svg .halo{ transform-origin:center; transform-box:fill-box; }
  .tile svg{ transform-origin:50% 50%; }

  @keyframes breathe { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
  .tile[data-anim] svg .on{ animation: breathe 3.6s ease-in-out infinite; animation-delay: var(--ad,0s); }
  .tile[data-anim] svg .halo{ animation: breathe 3.6s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* spin — rotating browsers / loaders */
  @keyframes spin { to{ transform: rotate(360deg) } }
  .tile[data-anim="spin"] svg{ animation: spin 14s linear infinite; animation-delay: var(--ad,0s); }
  .tile[data-anim="spin-slow"] svg{ animation: spin 24s linear infinite; animation-delay: var(--ad,0s); }
  .tile[data-anim="spin-fast"] svg{ animation: spin 6s linear infinite; animation-delay: var(--ad,0s); }

  /* gear — settings */
  @keyframes gear { 0%{transform:rotate(0)} 100%{transform:rotate(60deg)} }
  .tile[data-anim="gear"] svg{ animation: gear 3s steps(6) infinite; animation-delay: var(--ad,0s); }

  /* pulse — heartbeat / glow */
  @keyframes pulse-glow {
    0%,100%{ filter: brightness(1) drop-shadow(0 0 0 currentColor); }
    50%{ filter: brightness(1.45) drop-shadow(0 0 4px currentColor); }
  }
  .tile[data-anim="pulse"] svg .on,
  .tile[data-anim="pulse"] svg .halo{ animation: pulse-glow 1.6s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* fast pulse for live/recording */
  @keyframes rec-pulse {
    0%,100%{ opacity:1 }
    50%{ opacity:.35 }
  }
  .tile[data-anim="rec"] svg .on,
  .tile[data-anim="rec"] svg .halo{ animation: rec-pulse 1.1s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* blink — comm/connection */
  @keyframes blink {
    0%,45%,100%{ opacity:1 }
    50%,55%{ opacity:.25 }
    60%{ opacity:1 }
  }
  .tile[data-anim="blink"] svg .on,
  .tile[data-anim="blink"] svg .halo{ animation: blink 2.4s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* bounce — chat apps */
  @keyframes bounce { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-3px) } }
  .tile[data-anim="bounce"] svg{ animation: bounce 2s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* shake/glitch — tiktok/capcut */
  @keyframes glitch {
    0%,90%,100%{ transform: translate(0,0) }
    92%{ transform: translate(-1.5px, 0.5px) }
    94%{ transform: translate(1.5px, -0.5px) }
    96%{ transform: translate(-1px, -0.5px) }
    98%{ transform: translate(1px, 0.5px) }
  }
  .tile[data-anim="glitch"] svg{ animation: glitch 4s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* equalizer / music waves: scale-y rows */
  @keyframes wave {
    0%,100%{ transform: scaleY(1) }
    50%{ transform: scaleY(1.25) }
  }
  .tile[data-anim="wave"] svg{ animation: wave 1.4s ease-in-out infinite; transform-origin: 50% 70%; animation-delay: var(--ad,0s); }

  /* signal — wifi/bluetooth, expand outward */
  @keyframes signal {
    0%{ transform: scale(0.92); opacity:.55 }
    50%{ transform: scale(1.04); opacity:1 }
    100%{ transform: scale(0.92); opacity:.55 }
  }
  .tile[data-anim="signal"] svg .on,
  .tile[data-anim="signal"] svg .halo{ animation: signal 2.2s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* float — gentle vertical drift (planes, fox, gem) */
  @keyframes float { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-2px) } }
  .tile[data-anim="float"] svg{ animation: float 3.4s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* slide-x — telegram plane */
  @keyframes slide-x {
    0%,100%{ transform: translateX(0) }
    50%{ transform: translateX(3px) }
  }
  .tile[data-anim="slide"] svg{ animation: slide-x 2.6s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* shimmer — single sweep brightness */
  @keyframes shimmer {
    0%,100%{ filter: brightness(0.95) }
    50%{ filter: brightness(1.4) }
  }
  .tile[data-anim="shimmer"] svg .on,
  .tile[data-anim="shimmer"] svg .halo{ animation: shimmer 2.8s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* power — toggle blink for power buttons */
  @keyframes power {
    0%,100%{ opacity:1 }
    48%{ opacity:1 }
    50%{ opacity:.2 }
    52%{ opacity:1 }
  }
  .tile[data-anim="power"] svg .on,
  .tile[data-anim="power"] svg .halo{ animation: power 3s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* tilt — wobble (controllers/games) */
  @keyframes tilt {
    0%,100%{ transform: rotate(-2deg) }
    50%{ transform: rotate(2deg) }
  }
  .tile[data-anim="tilt"] svg{ animation: tilt 3s ease-in-out infinite; animation-delay: var(--ad,0s); }

  /* hover power-on flicker */
  @keyframes flicker {
    0%,100%{opacity:1}
    8%{opacity:.85}
    9%{opacity:1}
    40%{opacity:.94}
    41%{opacity:1}
  }
  .tile:hover svg .on, .tile:hover svg .halo{animation:flicker 2s ease-in-out infinite}

  footer{max-width:1320px;margin:48px auto 0;color:#3a3a3e;font-family:var(--mono);font-size:10px;letter-spacing:0.06em}
</style>

/* -------------------------------------------------
   Dot-matrix icon generator
   - 17×17 grid, dot radius 3.2, pitch 8
   - bitmap defined as 17 strings of 17 chars: "." off, "#" on
   - color per icon = brand color
-------------------------------------------------- */

const SIZE = 17;
const PITCH = 8;
const PAD = 4;        // px padding inside 140 viewbox
const R_ON = 3.2;
const R_OFF = 1.6;

function svg(bitmap, color, palette){
  const VB = 140;
  let halo = "";
  let on = "";
  let off = "";
  // palette: map of char -> color. Default any non "." non " " to `color`.
  const pal = palette || {};
  for(let y=0;y<SIZE;y++){
    for(let x=0;x<SIZE;x++){
      const cx = PAD + x*PITCH + PITCH/2;
      const cy = PAD + y*PITCH + PITCH/2;
      const ch = bitmap[y]?.[x] ?? ".";
      const isOn = ch !== "." && ch !== " ";
      if(isOn){
        const c = pal[ch] || color;
        halo += `<circle class="halo" cx="${cx}" cy="${cy}" r="${R_ON+1.6}" fill="${c}"/>`;
        on   += `<circle class="on"   cx="${cx}" cy="${cy}" r="${R_ON}" fill="${c}"/>`;
      } else {
        const cls = (x+y)%2 ? "off-r" : "off";
        off  += `<circle class="${cls}" cx="${cx}" cy="${cy}" r="${R_OFF}"/>`;
      }
    }
  }
  return `<svg viewBox="0 0 ${VB} ${VB}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="vig" cx="50%" cy="40%" r="70%">
        <stop offset="0%" stop-color="#0a0a0f"/>
        <stop offset="100%" stop-color="#000"/>
      </radialGradient>
    </defs>
    <rect width="${VB}" height="${VB}" rx="6" fill="url(#vig)"/>
    <g>${off}</g>
    <g>${halo}</g>
    <g>${on}</g>
  </svg>`;
}

/* Render */
const wrap = document.getElementById("wrap");
let n = 0;
GROUPS.forEach((g, gi) => {
  const sec = document.createElement("section");
  const num = String(gi+1).padStart(2,"0");
  const total = g.items.length;
  sec.innerHTML = `<h2><span class="num">${num}</span><span class="emoji">${g.emoji}</span> ${g.title} <span class="count">${total}</span></h2>
    <div class="grid"></div>`;
  const grid = sec.querySelector(".grid");
  g.items.forEach(([key, label, color]) => {
    n++;
    const bm = I[key] || Array(SIZE).fill(".".repeat(SIZE));
    // pad/clip bitmap to exactly SIZE×SIZE
    const fixed = Array.from({length:SIZE}, (_,y) => {
      const row = (bm[y]||"").padEnd(SIZE, ".").slice(0, SIZE);
      return row;
    });
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.setAttribute("data-anim", ANIMS[key] || "breathe");
    // desync animations so the grid feels alive, not metronomic
    tile.style.setProperty("--ad", (Math.random()*-3).toFixed(2)+"s");
    tile.innerHTML = `
      <span class="idx">${String(n).padStart(2,"0")}</span>
      <div class="panel">${svg(fixed, color, PALETTES[key])}</div>
      <div class="lbl">${label}</div>`;
    grid.appendChild(tile);
  });
  wrap.appendChild(sec);
});
